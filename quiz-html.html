            function evalueReponse(quelBouton) {
                if (quelBouton === "bon") {

                    document.querySelector(".reponse").innerHTML = questionChoisie[questionChoisie.length - 1]; // questionChoisie[questionChoisie.length - 1] est toujours la chose à afficher, peu importe la longueur de la liste de questions (deux ou trois éléments)
                } else if (quelBouton === "bon") {
                    evalueReponse("bon");
